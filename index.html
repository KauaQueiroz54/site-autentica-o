<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kathai — Entrar</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <main class="wrapper">
        <section class="slogan-side" aria-label="Kathai">
            <div class="sc">
                <span class="slogan-tag">✦ 2024 — 2026</span>
                <div class="slogan-title">KATHAI</div>
                <p class="slogan-sub">
                    <strong>Kauã e Thaina</strong> — os mais mais (5G)<br>
                    de Redes de Computadores.
                </p>
                <div class="slogan-cards">
                    <div class="slogan-pill">
                        <div class="slogan-pill-icon">🎓</div>
                        <div>
                            <strong>Redes de Computadores</strong><br>
                            <span style="font-size:12px;color:#6b7280;">Turma 2024–2026</span>
                        </div>
                    </div>
                    <div class="slogan-pill">
                        <div class="dot"></div>
                        <span><strong>Turma ativa</strong> · Sistema de tarefas online</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="login-side" aria-label="Login">
            <span class="badge">Kathai</span>

            <div class="header">
                <h1>Entrar na conta</h1>
                <p>Insira suas credenciais para acessar o painel</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>

                <div class="actions">
                    <label><input type="checkbox"> Lembrar-me</label>
                    <a href="recuperar.html" id="forgotPassword">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div class="divider">ou</div>

            <button type="button" class="btn-oauth" id="googleLogin">
                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continuar com o Google
            </button>

            <p class="footer-text">
                Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
            </p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="src/js/login.js"></script>
</body>
</html>
