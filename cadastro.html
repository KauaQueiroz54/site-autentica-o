<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kathai — Criar Conta</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <main class="card">
        <span class="badge">Kathai</span>

        <div class="header">
            <h1>Criar nova conta</h1>
            <p>Insira um e-mail e uma senha para se cadastrar</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="regEmail">E-mail</label>
                <input type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="regPassword">Senha</label>
                <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
            </div>

            <button type="submit" class="btn-primary">Criar conta</button>
            <a href="index.html" id="backToLogin" class="btn-secondary">Já tenho uma conta</a>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="src/js/cadastro.js"></script>
</body>
</html>
